<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <main id="container">
      <div class="sidebar">
        <div class="projects-container">
          <h1>TODO LIST</h1>
          <ul class="projects-list">
          </ul>
        </div>
        <a class="add-project">+ New Project</a>
      </div>
      <div class="todo-container">
        <h1 class="current-project">Study</h1>
        <div class="todos">
          <div class="todo">
            <div class="todo-info">
              <div>
                <input type="checkbox" />
              </div>
              <div>
                <h3 class="title">Programming</h3>
                <p class="description">Pair-Programming</p>
              </div>
            </div>
            <div class="todo-props">
              <p class="priority">High</p>
              <p class="dueDate">04/27/2026</p>
            </div>
          </div>
          <div class="todo">
            <div class="todo-info">
              <div>
                <input type="checkbox" />
              </div>
              <div>
                <h3 class="title">Italian</h3>
                <p class="description">Read pages 13 to 23</p>
              </div>
            </div>
            <div class="todo-props">
              <p class="priority">High</p>
              <p class="dueDate">05/08/2026</p>
            </div>
          </div>
        </div>
        <button class="add-btn">+</button>
      </div>
    </main>
  </body>
</html>
